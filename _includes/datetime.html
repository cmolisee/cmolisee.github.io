{% assign df_strftime = site.data.layout.df.post.strftime | default: '%d/%m/%Y' %}
{% assign df_dayjs = site.data.layout.df.post.dayjs | default: 'DD/MM/YYYY' %}

<time {% if include.class %} class="{{ include.class }}" {% endif %} 
    data-ts="{{ include.date | date: '%s' }}"
    data-df="{{ df_dayjs }}">
    {{ include.date | date: df_strftime }}
</time>
